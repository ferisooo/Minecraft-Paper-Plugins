# ✿~ KawaiiShop config ~✿

# Worlds whose names start with this prefix count as "skyblock" worlds. The
# shop only opens there, and the banned-item rules below only apply there.
# (KawaiiSkyblock names island worlds "kawaii_isle_<owner>".)
skyblock-world-prefix: 'kawaii_isle_'

# Coins every player starts with the first time they're seen.
starting-balance: 100

# Symbol shown next to amounts in messages and the GUI.
currency-symbol: '✦'

# Items a player must NOT be able to use to smuggle items out of skyblock
# into the normal world. The classic offender is the ENDER_CHEST, whose
# contents are shared across every world. While standing in a skyblock world
# these items can't be opened or placed (admins with kawaiishop.admin bypass).
banned-in-skyblock:
  - ENDER_CHEST

# ── Shop catalogue, grouped into categories ─────────────────────────────────
# Each category has a display name, an icon (Material) for the category menu,
# and an "items" map. Each item: MATERIAL: { buy: <coins>, sell: <coins> }
#   buy  -1  -> cannot be bought (sell-only)
#   sell -1  -> cannot be sold (buy-only)
# Prices are tuned by rarity / how hard the item is to get on an island.
# Selling always pays less than buying, so you can't farm the spread.
# IMPORTANT: keep a space after every colon (YAML needs "KEY: { ... }").
shop:
  blocks:
    name: '&aBlocks'
    icon: GRASS_BLOCK
    items:
      DIRT: { buy: 2, sell: 1 }
