name: KawaiiControlPanel
version: ${project.version}
main: com.ferisooo.kawaiicontrolpanel.KawaiiControlPanel
api-version: '1.21'
folia-supported: true
author: Ferris
description: In-game chest-GUI control panel to configure every Kawaii plugin live.

commands:
  kpanel:
    description: Open the Kawaii control panel GUI.
    usage: /kpanel
    aliases: [kawaiipanel, kcp, kconfig]
    permission: kawaiicontrolpanel.admin

permissions:
  kawaiicontrolpanel.admin:
    description: Open and edit settings through the control panel.
    default: op
